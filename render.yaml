services:
  - type: web
    name: resumematch-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false  # set manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.10"
